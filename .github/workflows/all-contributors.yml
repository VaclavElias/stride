name: All Contributors

on:
  workflow_dispatch:
    inputs:
      commands:
        description: One or more /contributor add commands to apply
        required: true
        type: string
      base-branch:
        description: Base branch for the generated pull request
        required: false
        default: master
        type: string
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: all-contributors-${{ github.event.issue.number || github.ref_name }}
  cancel-in-progress: false

jobs:
  update:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '/contributor add ') &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.base-branch || github.event.repository.default_branch }}
          fetch-depth: 0

      - name: Capture contributor commands
        shell: bash
        env:
          CONTRIBUTOR_COMMANDS: ${{ github.event_name == 'workflow_dispatch' && inputs.commands || github.event.comment.body }}
        run: |
          printf '%s\n' "$CONTRIBUTOR_COMMANDS" > /tmp/all-contributors-commands.txt

      - name: Update contributor files
        uses: ./.github/actions/all-contributors
        with:
          command: apply-commands
          repo-root: ${{ github.workspace }}
          commands-file: /tmp/all-contributors-commands.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build branch and PR metadata
        id: metadata
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          users = []
          seen = set()
          for line in Path('/tmp/all-contributors-commands.txt').read_text().splitlines():
              parts = line.strip().split()
              if len(parts) != 4:
                  continue

              command, action, user, contribution_type = parts
              if command.lower() != '/contributor' or action.lower() != 'add':
                  continue

              user = user.removeprefix('@')
              if not user or not user[0].isalnum() or not user[-1].isalnum():
                  continue

              if not all(character.isalnum() or character == '-' for character in user):
                  continue

              if not contribution_type or not contribution_type[0].isalpha() or not contribution_type.isalnum():
                  continue

              user_key = user.lower()
              if user_key not in seen:
                  seen.add(user_key)
                  users.append(user)

          if not users:
              raise SystemExit('No valid contributor commands were found.')

          branch = f'all-contributors/add-{users[0]}'
          mentions = ', '.join(f'@{user}' for user in users)
          title = f'docs: add all-contributors entry for {mentions}' if len(users) == 1 else f'docs: add all-contributors entries for {mentions}'

          with open(os.environ['GITHUB_OUTPUT'], 'a', encoding='utf-8') as handle:
              print(f'branch={branch}', file=handle)
              print(f'title={title}', file=handle)
          PY

      - name: Detect contributor file changes
        id: diff
        shell: bash
        run: |
          if git diff --quiet -- README.md .all-contributorsrc; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No contributor changes were produced."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create contributor pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ steps.metadata.outputs.branch }}
          base: ${{ github.event_name == 'workflow_dispatch' && inputs.base-branch || github.event.repository.default_branch }}
          delete-branch: true
          commit-message: ${{ steps.metadata.outputs.title }}
          title: ${{ steps.metadata.outputs.title }}
          body: |
            Automated all-contributors update generated by `${{ github.workflow }}`.

            Commands:
            ```text
            ${{ github.event_name == 'workflow_dispatch' && inputs.commands || github.event.comment.body }}
            ```
